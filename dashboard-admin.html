<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8BitBrain</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="imgs/Sans_Favi.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="header">
      <a href="index.html" class="logo"
        >8BitBrain
        <img src="imgs/Sans_Favi.png" alt="logo" class="logoimg" />
      </a>

      <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="about.html">About</a>
        <a href="modes.html">Game Modes</a>
        <a href="contacts.html">Contact</a>
        <a href="leaderboards.html">Leaderboards</a>
        <a href="login.html"><button class="btn-login">Login</button></a>
      </nav>
    </header>
    <main>
      <div class="dashboard-section">
          <div class="dashboard-big-card">
            <div class="carousel">
             <div class="slides">
              <div class="slide">Slide 1 - Game Banner</div>
              <div class="slide">Slide 2 - Featured Game</div>
              <div class="slide">Slide 3 - Promotion</div>
              <div class="slide">Slide 4 - Promotion</div>
              <div class="slide">Slide 5 - Promotion</div>
            </div>
            <button class="prev">❮</button>
            <button class="next">❯</button>
            </div>
          </div>
          <div class="dashboard-main">
            <div class="read"><img src="imgs/Dashboard-data-sample.png" style="width: 800px; height: 350px;"></div>
          </div>
          <div class="dashboard-side">
            <div class="create"><button class="btn">Create</button></div>
            <div class="delete"><button class="btn">Delete</button></div>
            <div class="update"><button class="btn">Update</button></div>
          </div>
      </div>
      </section>

      <script src="script.js"></script>
    </body>
    </html>
